name: Deploy to Azure

# On push to main: build the image in ACR (cloud build) and roll it out to the
# Container App. Config comes from repo Variables; auth from a repo Secret.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  APP_NAME: ${{ vars.AZURE_APP_NAME }}
  IMAGE: evelyn-ops

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build image in ACR (server-side build from Dockerfile)
        run: |
          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE:${{ github.sha }}" \
            --image "$IMAGE:latest" \
            .

      - name: Roll out to Container App
        run: |
          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/$IMAGE:${{ github.sha }}"
