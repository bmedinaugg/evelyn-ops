# Build and deploy the Next.js app to Azure Web App (App Service, Node).
# Auth via publish profile (repo secret AZURE_WEBAPP_PUBLISH_PROFILE) — no OIDC.

name: Build and deploy Node.js app to Azure Web App - evelyn-ops

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'evelyn-ops'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
